<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#E8001C">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="CrimsonCall">
  <title>CrimsonCall</title>
  <link rel="manifest" href="data:application/json,%7B%22name%22%3A%22CrimsonCall%22%2C%22short_name%22%3A%22CrimsonCall%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23FFFFFF%22%2C%22theme_color%22%3A%22%23E8001C%22%2C%22orientation%22%3A%22portrait%22%2C%22icons%22%3A%5B%5D%7D">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/peerjs@latest/dist/peerjs.min.js" defer></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-bg: #FFFFFF;
      --color-surface: #F8F8F8;
      --color-surface-2: #F0F0F0;
      --color-brand-red: #E8001C;
      --color-brand-red-dark: #B0001A;
      --color-brand-red-glow: rgba(232, 0, 28, 0.25);
      --color-brand-blue: #0057FF;
      --color-brand-blue-dark: #003FBB;
      --color-brand-blue-glow: rgba(0, 87, 255, 0.22);
      --color-text-primary: #0A0A0A;
      --color-text-secondary: #5A5A5A;
      --color-text-muted: #9A9A9A;
      --color-danger: #E8001C;
      --color-success: #00C853;
      --color-muted-bg: #D0D0D0;
      --radius-sm: 8px;
      --radius-md: 16px;
      --radius-lg: 24px;
      --radius-full: 9999px;
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
      --shadow-md: 0 8px 32px rgba(0,0,0,0.10);
      --shadow-lg: 0 16px 56px rgba(0,0,0,0.14);
      --shadow-red: 0 8px 32px var(--color-brand-red-glow);
      --shadow-blue: 0 8px 32px var(--color-brand-blue-glow);
      --font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
      --transition-normal: 280ms cubic-bezier(0.4, 0, 0.2, 1);
      --transition-slow: 450ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: var(--color-bg);
      font-family: var(--font-family);
      color: var(--color-text-primary);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    /* ── SCREENS ── */
    .screen {
      display: none;
      position: absolute;
      inset: 0;
      opacity: 0;
      background: var(--color-bg);
    }
    .screen.active {
      display: flex;
      opacity: 1;
    }
    .screen.entering {
      animation: screenEnter var(--transition-normal) forwards;
    }
    .screen.leaving {
      animation: screenLeave var(--transition-normal) forwards;
    }
    @keyframes screenEnter {
      from { opacity: 0; transform: translateY(-12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes screenLeave {
      from { opacity: 1; transform: translateY(0); }
      to   { opacity: 0; transform: translateY(12px); }
    }

    /* ── SCREEN: SPLASH ── */
    #screen-splash {
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 48px;
      padding: 32px;
    }
    .splash-logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .splash-logo-icon {
      width: 96px;
      height: 96px;
      filter: drop-shadow(0 8px 24px var(--color-brand-red-glow));
    }
    .splash-title {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 0.15em;
      color: var(--color-text-primary);
      text-transform: uppercase;
    }
    .splash-subtitle {
      font-size: 14px;
      font-weight: 400;
      color: var(--color-text-muted);
      margin-top: -8px;
    }

    /* ── BUTTONS ── */
    .btn-primary-red {
      min-width: 280px;
      height: 64px;
      background: var(--color-brand-red);
      color: #fff;
      border: none;
      border-radius: var(--radius-full);
      font-family: var(--font-family);
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 0.08em;
      cursor: pointer;
      box-shadow: var(--shadow-red);
      transition: background var(--transition-fast), box-shadow var(--transition-fast), transform var(--transition-fast);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 0 28px;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-primary-red:hover {
      background: var(--color-brand-red-dark);
      box-shadow: 0 12px 40px var(--color-brand-red-glow);
      transform: translateY(-2px);
    }
    .btn-primary-red:active {
      transform: scale(0.97);
      box-shadow: var(--shadow-sm);
    }

    .btn-primary-blue {
      min-width: 280px;
      height: 64px;
      background: var(--color-brand-blue);
      color: #fff;
      border: none;
      border-radius: var(--radius-full);
      font-family: var(--font-family);
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 0.08em;
      cursor: pointer;
      box-shadow: var(--shadow-blue);
      transition: background var(--transition-fast), box-shadow var(--transition-fast), transform var(--transition-fast);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 0 28px;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-primary-blue:hover {
      background: var(--color-brand-blue-dark);
      box-shadow: 0 12px 40px var(--color-brand-blue-glow);
      transform: translateY(-2px);
    }
    .btn-primary-blue:active {
      transform: scale(0.97);
      box-shadow: var(--shadow-sm);
    }

    .btn-back {
      background: none;
      border: none;
      font-family: var(--font-family);
      font-size: 14px;
      color: var(--color-text-muted);
      cursor: pointer;
      padding: 8px 16px;
      border-radius: var(--radius-full);
      transition: color var(--transition-fast), background var(--transition-fast);
      -webkit-tap-highlight-color: transparent;
    }
    .btn-back:hover {
      color: var(--color-text-secondary);
      background: var(--color-surface-2);
    }

    /* ── SCREEN: MENU ── */
    #screen-menu {
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 24px;
      padding: 32px;
    }
    .menu-heading {
      font-size: 22px;
      font-weight: 700;
      color: var(--color-text-primary);
      text-align: center;
    }
    .menu-subheading {
      font-size: 14px;
      font-weight: 400;
      color: var(--color-text-muted);
      text-align: center;
      margin-top: -12px;
    }
    .menu-buttons {
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 100%;
      max-width: 340px;
    }
    .menu-buttons .btn-primary-red,
    .menu-buttons .btn-primary-blue {
      width: 100%;
      min-width: unset;
      height: 72px;
      font-size: 18px;
      border-radius: var(--radius-lg);
    }

    /* ── SCREEN: JOIN ── */
    #screen-join {
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 20px;
      padding: 32px;
    }
    .join-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--color-text-primary);
    }
    #input-room-code {
      width: 100%;
      max-width: 340px;
      height: 56px;
      font-family: var(--font-family);
      font-size: 24px;
      font-weight: 700;
      text-align: center;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      background: var(--color-surface);
      border: 2px solid var(--color-surface-2);
      border-radius: var(--radius-md);
      color: var(--color-text-primary);
      outline: none;
      transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
      padding: 0 16px;
    }
    #input-room-code::placeholder {
      color: var(--color-text-muted);
      font-weight: 400;
      letter-spacing: 0.1em;
    }
    #input-room-code:focus {
      border-color: var(--color-brand-blue);
      box-shadow: 0 0 0 4px var(--color-brand-blue-glow);
    }
    #btn-join-room {
      width: 100%;
      max-width: 340px;
      min-width: unset;
      height: 64px;
    }

    /* ── SCREEN: ROOM ── */
    #screen-room {
      flex-direction: column;
      height: 100dvh;
      padding: 24px;
      gap: 16px;
      overflow: hidden;
    }

    .room-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    .room-header-left {}
    .room-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--color-text-muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .room-code-display {
      font-size: 28px;
      font-weight: 800;
      color: var(--color-brand-red);
      letter-spacing: 0.15em;
      line-height: 1.1;
    }
    .btn-copy-code {
      background: var(--color-surface-2);
      border: 1.5px solid var(--color-surface-2);
      border-radius: var(--radius-full);
      padding: 8px 16px;
      font-family: var(--font-family);
      font-size: 13px;
      font-weight: 600;
      color: var(--color-text-secondary);
      cursor: pointer;
      transition: background var(--transition-fast), color var(--transition-fast), transform var(--transition-fast);
      -webkit-tap-highlight-color: transparent;
    }
    .btn-copy-code:hover {
      background: var(--color-muted-bg);
      color: var(--color-text-primary);
    }
    .btn-copy-code:active {
      transform: scale(0.95);
    }

    #participants-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      gap: 16px;
      flex: 1;
      align-content: start;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .participant-card {
      background: var(--color-surface);
      border-radius: var(--radius-lg);
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      box-shadow: var(--shadow-sm);
      transition: opacity var(--transition-normal), transform var(--transition-normal);
      animation: cardIn 280ms cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }
    .participant-card.leaving {
      animation: cardOut 280ms cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: scale(0.88); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes cardOut {
      from { opacity: 1; transform: scale(1); }
      to   { opacity: 0; transform: scale(0.88); }
    }

    .avatar-wrap {
      position: relative;
      width: 64px;
      height: 64px;
    }
    .avatar-ring {
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 3px solid transparent;
      transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
      pointer-events: none;
    }
    .avatar-ring.speaking {
      border-color: var(--color-brand-red);
      box-shadow: 0 0 12px var(--color-brand-red-glow);
      animation: speakPulse 800ms ease-in-out infinite;
    }
    @keyframes speakPulse {
      0%, 100% { box-shadow: 0 0 8px var(--color-brand-red-glow); }
      50%       { box-shadow: 0 0 18px rgba(232,0,28,0.45); }
    }
    .avatar-circle {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 700;
      color: #fff;
      text-transform: uppercase;
      user-select: none;
    }
    .participant-name {
      font-size: 12px;
      font-weight: 600;
      color: var(--color-text-secondary);
      text-align: center;
      max-width: 90px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .participant-mic-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.6;
    }
    .participant-mic-icon.muted {
      opacity: 1;
    }
    .participant-mic-icon.muted svg path {
      stroke: var(--color-danger);
    }

    /* ── ROOM CONTROLS ── */
    .room-controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      flex-shrink: 0;
      padding-bottom: env(safe-area-inset-bottom, 16px);
    }

    .btn-mute {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: none;
      background: var(--color-brand-red);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow-red);
      transition: background var(--transition-normal), box-shadow var(--transition-normal), transform var(--transition-fast);
      -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
    }
    .btn-mute.muted {
      background: var(--color-surface-2);
      box-shadow: var(--shadow-sm);
    }
    .btn-mute:active {
      transform: scale(0.92);
    }

    .btn-hangup {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: none;
      background: var(--color-brand-red);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow-red);
      transition: background var(--transition-fast), transform var(--transition-fast), box-shadow var(--transition-fast);
      -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
    }
    .btn-hangup:hover {
      background: var(--color-brand-red-dark);
    }
    .btn-hangup:active {
      transform: scale(0.92);
      box-shadow: var(--shadow-sm);
    }

    .btn-volume {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: none;
      background: var(--color-surface-2);
      color: var(--color-text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow-sm);
      transition: background var(--transition-fast), transform var(--transition-fast);
      -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
    }
    .btn-volume:active {
      transform: scale(0.92);
    }

    /* ── TOAST ── */
    #toast-container {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: center;
      pointer-events: none;
      width: 100%;
      padding: 0 16px;
    }
    .toast {
      background: var(--color-text-primary);
      color: #fff;
      padding: 12px 20px;
      border-radius: var(--radius-full);
      font-family: var(--font-family);
      font-size: 14px;
      font-weight: 500;
      box-shadow: var(--shadow-lg);
      display: flex;
      align-items: center;
      gap: 8px;
      max-width: 340px;
      border-left: 4px solid transparent;
      opacity: 0;
      transform: translateY(16px);
      animation: toastIn 220ms cubic-bezier(0.4, 0, 0.2, 1) forwards;
      pointer-events: auto;
    }
    .toast.success { border-left-color: var(--color-success); }
    .toast.error   { border-left-color: var(--color-danger); }
    .toast.info    { border-left-color: var(--color-brand-blue); }
    .toast.out {
      animation: toastOut 220ms cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }
    @keyframes toastIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes toastOut {
      from { opacity: 1; transform: translateY(0); }
      to   { opacity: 0; transform: translateY(16px); }
    }

    /* ── MODAL ── */
    #modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      z-index: 8888;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    #modal-overlay.active {
      display: flex;
    }
    .modal-card {
      background: #fff;
      border-radius: var(--radius-lg);
      padding: 28px;
      max-width: 320px;
      width: 100%;
      box-shadow: var(--shadow-lg);
      animation: modalIn 280ms cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }
    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.92); }
      to   { opacity: 1; transform: scale(1); }
    }
    .modal-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--color-text-primary);
      margin-bottom: 8px;
    }
    .modal-message {
      font-size: 14px;
      font-weight: 400;
      color: var(--color-text-secondary);
      margin-bottom: 24px;
      line-height: 1.5;
    }
    .modal-buttons {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }
    .btn-modal-cancel {
      background: none;
      border: 1.5px solid var(--color-surface-2);
      border-radius: var(--radius-full);
      padding: 10px 20px;
      font-family: var(--font-family);
      font-size: 14px;
      font-weight: 600;
      color: var(--color-text-secondary);
      cursor: pointer;
      transition: background var(--transition-fast), color var(--transition-fast);
      -webkit-tap-highlight-color: transparent;
    }
    .btn-modal-cancel:hover {
      background: var(--color-surface-2);
      color: var(--color-text-primary);
    }
    .btn-modal-confirm-red {
      background: var(--color-brand-red);
      border: none;
      border-radius: var(--radius-full);
      padding: 10px 20px;
      font-family: var(--font-family);
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      box-shadow: var(--shadow-red);
      transition: background var(--transition-fast), box-shadow var(--transition-fast), transform var(--transition-fast);
      -webkit-tap-highlight-color: transparent;
    }
    .btn-modal-confirm-red:hover {
      background: var(--color-brand-red-dark);
    }
    .btn-modal-confirm-red:active {
      transform: scale(0.96);
    }
    .btn-modal-confirm-blue {
      background: var(--color-brand-blue);
      border: none;
      border-radius: var(--radius-full);
      padding: 10px 20px;
      font-family: var(--font-family);
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      box-shadow: var(--shadow-blue);
      transition: background var(--transition-fast), box-shadow var(--transition-fast), transform var(--transition-fast);
      -webkit-tap-highlight-color: transparent;
    }
    .btn-modal-confirm-blue:hover {
      background: var(--color-brand-blue-dark);
    }
    .btn-modal-confirm-blue:active {
      transform: scale(0.96);
    }

    /* ── BOTTOM SHEET (Volume) ── */
    #volume-sheet {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #fff;
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
      padding: 20px 24px;
      padding-bottom: calc(20px + env(safe-area-inset-bottom, 0px));
      box-shadow: 0 -8px 40px rgba(0,0,0,0.12);
      z-index: 7777;
      transform: translateY(100%);
      transition: transform var(--transition-normal);
    }
    #volume-sheet.open {
      transform: translateY(0);
    }
    #sheet-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.3);
      z-index: 7776;
      display: none;
      -webkit-tap-highlight-color: transparent;
    }
    #sheet-backdrop.active { display: block; }
    .sheet-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--color-text-primary);
      margin-bottom: 16px;
      text-align: center;
    }
    .sheet-row {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    #volume-slider {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 4px;
      border-radius: var(--radius-full);
      background: var(--color-surface-2);
      outline: none;
      cursor: pointer;
    }
    #volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--color-brand-red);
      cursor: pointer;
      box-shadow: var(--shadow-red);
    }
    #volume-slider::-moz-range-thumb {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--color-brand-red);
      cursor: pointer;
      box-shadow: var(--shadow-red);
      border: none;
    }
    .volume-label {
      font-size: 13px;
      font-weight: 700;
      color: var(--color-text-secondary);
      min-width: 38px;
      text-align: right;
    }

    /* Scrollbar styling */
    #participants-grid::-webkit-scrollbar { width: 4px; }
    #participants-grid::-webkit-scrollbar-track { background: transparent; }
    #participants-grid::-webkit-scrollbar-thumb { background: var(--color-muted-bg); border-radius: 4px; }
  </style>
</head>
<body>
<div id="app">

  <!-- ========== SCREEN: SPLASH ========== -->
  <div id="screen-splash" class="screen active">
    <div class="splash-logo-wrap">
      <!-- Microphone SVG Logo -->

<script>
// ============================================================
// 1. CONSTANTES Y ESTADO GLOBAL
// ============================================================
const AppState = {
  peer: null,
  localStream: null,
  processedStream: null,
  audioContext: null,
  wakeLock: null,
  vadAnimFrame: null,
  roomCode: null,
  isHost: false,
  isMuted: false,
  peers: {},       // { peerId: { call, dataConn, gainNode } }
  peerGains: {},   // { peerId: GainNode }
  masterGain: null,
  silentOscillator: null,
  isInCall: false,
  heartbeatInterval: null,
};

// ============================================================
// 2. DETECCIÓN DE PLATAFORMA
// ============================================================
const ua = navigator.userAgent;
const isIOS     = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
const isSafari  = /^((?!chrome|android).)*safari/i.test(ua);
const isAndroid = /Android/i.test(ua);
const isFirefox = /Firefox/i.test(ua);

// ============================================================
// 3. GESTIÓN DE PANTALLAS
// ============================================================
let currentScreen = 'screen-splash';

function showScreen(id) {
  const current = document.getElementById(currentScreen);
  const next    = document.getElementById(id);
  if (!current || !next || currentScreen === id) return;

  current.classList.add('leaving');
  current.classList.remove('active');

  setTimeout(() => {
    current.classList.remove('leaving');
    next.classList.add('active', 'entering');
    setTimeout(() => next.classList.remove('entering'), 300);
    currentScreen = id;
  }, 280);
}

// ============================================================
// 4. SISTEMA DE TOAST Y MODAL
// ============================================================
const toastContainer = document.getElementById('toast-container');
let activeToasts = [];

function showToast(message, type = 'info') {
  // Max 3 toasts
  if (activeToasts.length >= 3) {
    const oldest = activeToasts.shift();
    dismissToast(oldest);
  }

  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.textContent = message;
  toastContainer.appendChild(toast);
  activeToasts.push(toast);

  const timer = setTimeout(() => dismissToast(toast), 3000);
  toast._timer = timer;
}

function dismissToast(toast) {
  if (!toast || !toast.parentNode) return;
  clearTimeout(toast._timer);
  toast.classList.add('out');
  setTimeout(() => {
    if (toast.parentNode) toast.parentNode.removeChild(toast);
    activeToasts = activeToasts.filter(t => t !== toast);
  }, 220);
}

const modalOverlay = document.getElementById('modal-overlay');

function showModal({ title, message, confirmText = 'Confirmar', cancelText = 'Cancelar', onConfirm, danger = false }) {
  modalOverlay.innerHTML = '';
  modalOverlay.classList.add('active');

  const card = document.createElement('div');
  card.className = 'modal-card';
  card.innerHTML = `
    <div class="modal-title">${title}</div>
    <div class="modal-message">${message}</div>
    <div class="modal-buttons">
      <button class="btn-modal-cancel" id="modal-cancel">${cancelText}</button>
      <button class="${danger ? 'btn-modal-confirm-red' : 'btn-modal-confirm-blue'}" id="modal-confirm">${confirmText}</button>
    </div>
  `;
  modalOverlay.appendChild(card);

  card.querySelector('#modal-cancel').addEventListener('click', () => {
    modalOverlay.classList.remove('active');
    modalOverlay.innerHTML = '';
  });
  card.querySelector('#modal-confirm').addEventListener('click', () => {
    modalOverlay.classList.remove('active');
    modalOverlay.innerHTML = '';
    if (typeof onConfirm === 'function') onConfirm();
  });
  modalOverlay.addEventListener('click', (e) => {
    if (e.target === modalOverlay) {
      modalOverlay.classList.remove('active');
      modalOverlay.innerHTML = '';
    }
  }, { once: true });
}

// ============================================================
// 5. INICIALIZACIÓN DE AUDIO
// ============================================================
async function getAudioStream() {
  const constraintSets = [
    {
      audio: {
        echoCancellation: true,
        noiseSuppression: true,
        autoGainControl: true,
        channelCount: { ideal: 2, min: 1 },
        sampleRate: { ideal: 48000 },
        sampleSize: { ideal: 16 },
        latency: { ideal: 0.01, max: 0.05 }
      },
      video: false
    },
    {
      audio: {
        echoCancellation: true,
        noiseSuppression: true,
        autoGainControl: true,
        channelCount: { ideal: 1 }
      },
      video: false
    },
    { audio: true, video: false }
  ];

  for (const constraints of constraintSets) {
    try {
      const stream = await navigator.mediaDevices.getUserMedia(constraints);
      return stream;
    } catch (e) {
      console.warn('Constraints fallback:', e.name, e.message);
      if (e.name === 'NotAllowedError' || e.name === 'PermissionDeniedError') {
        throw e; // No point retrying
      }
    }
  }
  throw new Error('No_Mic');
}

function buildAudioContext() {
  const AC = window.AudioContext || window.webkitAudioContext;
  try {
    AppState.audioContext = new AC({ sampleRate: 48000, latencyHint: 'interactive' });
  } catch (e) {
    AppState.audioContext = new AC();
  }
  return AppState.audioContext;
}

async function resumeAudioContext() {
  if (AppState.audioContext && AppState.audioContext.state === 'suspended') {
    try { await AppState.audioContext.resume(); } catch(e) { console.warn('AudioContext resume failed', e); }
  }
}

function buildLocalPipeline(stream) {
  const ctx = AppState.audioContext;
  const source = ctx.createMediaStreamSource(stream);

  const compressor = ctx.createDynamicsCompressor();
  compressor.threshold.setValueAtTime(-24, ctx.currentTime);
  compressor.knee.setValueAtTime(6, ctx.currentTime);
  compressor.ratio.setValueAtTime(12, ctx.currentTime);
  compressor.attack.setValueAtTime(0.003, ctx.currentTime);
  compressor.release.setValueAtTime(0.25, ctx.currentTime);

  source.connect(compressor);

  const destination = ctx.createMediaStreamDestination();
  compressor.connect(destination);
  AppState.processedStream = destination.stream;

  // Start VAD on source (before compression)
  startVAD(source);

  return compressor;
}

function buildRemotePipeline(remoteStream, peerId) {
  const ctx = AppState.audioContext;
  const source = ctx.createMediaStreamSource(remoteStream);

  const compressor = ctx.createDynamicsCompressor();
  compressor.threshold.setValueAtTime(-24, ctx.currentTime);
  compressor.knee.setValueAtTime(6, ctx.currentTime);
  compressor.ratio.setValueAtTime(12, ctx.currentTime);
  compressor.attack.setValueAtTime(0.003, ctx.currentTime);
  compressor.release.setValueAtTime(0.25, ctx.currentTime);

  const gainNode = ctx.createGain();
  gainNode.gain.setValueAtTime(1.0, ctx.currentTime);

  // Master gain
  if (!AppState.masterGain) {
    AppState.masterGain = ctx.createGain();
    AppState.masterGain.gain.setValueAtTime(1.0, ctx.currentTime);
    AppState.masterGain.connect(ctx.destination);
  }

  source.connect(compressor);
  compressor.connect(gainNode);
  gainNode.connect(AppState.masterGain);

  AppState.peerGains[peerId] = gainNode;
  if (AppState.peers[peerId]) {
    AppState.peers[peerId].gainNode = gainNode;
  }
}

function forceOpusCodec(sdp) {
  const sdpLines = sdp.split('\r\n');
  const mLineIndex = sdpLines.findIndex(line => line.startsWith('m=audio'));
  if (mLineIndex === -1) return sdp;

  const opusMatch = sdp.match(/a=rtpmap:(\d+) opus\/48000/i);
  if (!opusMatch) return sdp;

  const opusPayload = opusMatch[1];
  const mLineParts = sdpLines[mLineIndex].split(' ');
  const payloads = mLineParts.slice(3);
  const reordered = [opusPayload, ...payloads.filter(p => p !== opusPayload)];
  sdpLines[mLineIndex] = [...mLineParts.slice(0, 3), ...reordered].join(' ');

  const opusFmtpIndex = sdpLines.findIndex(line => line.includes(`a=fmtp:${opusPayload}`));
  const opusParams = `a=fmtp:${opusPayload} minptime=10;useinbandfec=1;stereo=1;maxaveragebitrate=510000`;
  if (opusFmtpIndex !== -1) {
    sdpLines[opusFmtpIndex] = opusParams;
  } else {
    const rtpmapIndex = sdpLines.findIndex(line => line.includes(`a=rtpmap:${opusPayload}`));
    if (rtpmapIndex !== -1) sdpLines.splice(rtpmapIndex + 1, 0, opusParams);
  }

  return sdpLines.join('\r\n');
}

// ============================================================
// 6. PEER CONNECTION Y SALA
// ============================================================
function generateRoomCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  const array = new Uint8Array(6);
  crypto.getRandomValues(array);
  return Array.from(array, byte => chars[byte % chars.length]).join('');
}

function initPeer(customId) {
  const options = {
    debug: 0,
    config: {
      iceServers: [
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'stun:stun1.l.google.com:19302' }
      ]
    }
  };
  if (customId) {
    AppState.peer = new Peer(customId, options);
  } else {
    AppState.peer = new Peer(options);
  }
  return AppState.peer;
}

async function createRoom() {
  try {
    buildAudioContext();
    await resumeAudioContext();

    AppState.localStream = await getAudioStream();
    buildLocalPipeline(AppState.localStream);

    const code = generateRoomCode();
    AppState.roomCode = code;
    AppState.isHost = true;

    const peer = initPeer(code);

    peer.on('open', (id) => {
      AppState.isInCall = true;
      setupRoomScreen();
      startSilentOscillator();
      acquireWakeLock();
      startHeartbeat();
      showToast(`✓ Sala ${code} creada`, 'success');
      showScreen('screen-room');
    });

    peer.on('connection', (dataConn) => {
      handleIncomingDataConnection(dataConn);
    });

    peer.on('call', (call) => {
      handleIncomingCall(call);
    });

    peer.on('error', handlePeerError);
    peer.on('disconnected', () => {
      if (AppState.isInCall) {
        showToast('Conexión al servidor perdida. Intentando reconectar...', 'info');
        peer.reconnect();
      }
    });

  } catch (e) {
    handleGetUserMediaError(e);
  }
}

async function joinRoom(code) {
  if (!code || code.length < 4) {
    showToast('Por favor ingresa un código válido', 'error');
    return;
  }
  try {
    buildAudioContext();
    await resumeAudioContext();

    AppState.localStream = await getAudioStream();
    buildLocalPipeline(AppState.localStream);

    AppState.roomCode = code;
    AppState.isHost = false;

    const peer = initPeer();

    peer.on('open', (myId) => {
      // Connect data channel to host
      const dataConn = peer.connect(code, { reliable: true });
      dataConn.on('open', () => {
        dataConn.send({ type: 'hello', peerId: myId });
      });
      dataConn.on('data', (data) => {
        if (data.type === 'peer-list') {
          // Connect audio call to each existing peer
          const existingPeers = data.peers || [];
          existingPeers.forEach(existingPeerId => {
            if (existingPeerId !== myId) {
              initiateAudioCall(existingPeerId);
            }
          });
          // Add host to peer list
          if (!AppState.peers[code]) {
            AppState.peers[code] = { dataConn: null, call: null, gainNode: null };
          }
        } else if (data.type === 'new-peer') {
          // Another guest joined; they will call us
          addParticipantCard(data.peerId, false);
        } else if (data.type === 'peer-left') {
          removePeer(data.peerId);
        } else if (data.type === 'ping') {
          dataConn.send({ type: 'pong' });
        }
      });
      dataConn.on('error', (err) => {
        console.warn('DataConn error:', err);
        showToast('Error de conexión de datos', 'error');
      });
      dataConn.on('close', () => {
        if (AppState.isInCall) {
          showToast('Sala cerrada por el host', 'info');
          hangUp();
        }
      });

      AppState.peers[code] = { dataConn, call: null, gainNode: null };

      AppState.isInCall = true;
      setupRoomScreen();
      startSilentOscillator();
      acquireWakeLock();
      startHeartbeat();
      showToast(`✓ Conectado a la sala ${code}`, 'success');
      showScreen('screen-room');
    });

    peer.on('call', (call) => {
      handleIncomingCall(call);
    });

    peer.on('connection', (dataConn) => {
      // Peer-to-peer data from non-host peers
      handleIncomingDataConnection(dataConn);
    });

    peer.on('error', handlePeerError);

    peer.on('disconnected', () => {
      if (AppState.isInCall) {
        showToast('Reconectando...', 'info');
        peer.reconnect();
      }
    });

  } catch (e) {
    handleGetUserMediaError(e);
  }
}

function handleIncomingDataConnection(dataConn) {
  const remotePeerId = dataConn.peer;
  if (!AppState.peers[remotePeerId]) {
    AppState.peers[remotePeerId] = { dataConn: null, call: null, gainNode: null };
  }
  AppState.peers[remotePeerId].dataConn = dataConn;

  dataConn.on('open', () => {
    if (AppState.isHost) {
      // Send the list of all current peer IDs to the new guest (including HOST's own ID)
      const hostId = AppState.peer ? AppState.peer.id : AppState.roomCode;
      const otherPeers = Object.keys(AppState.peers).filter(id => id !== remotePeerId && id !== hostId);
      const currentPeerIds = [hostId, ...otherPeers];
      dataConn.send({ type: 'peer-list', peers: currentPeerIds });

      // Notify all existing peers about the new arrival
      Object.keys(AppState.peers).forEach(existingId => {
        if (existingId !== remotePeerId && AppState.peers[existingId].dataConn) {
          try {
            AppState.peers[existingId].dataConn.send({ type: 'new-peer', peerId: remotePeerId });
          } catch(e) { console.warn('Could not notify existing peer', e); }
        }
      });

      addParticipantCard(remotePeerId, false);
    }
  });

  dataConn.on('data', (data) => {
    if (data.type === 'ping') {
      try { dataConn.send({ type: 'pong' }); } catch(e) {}
    }
  });

  dataConn.on('close', () => {
    removePeer(remotePeerId);
  });

  dataConn.on('error', (err) => {
    console.warn('DataConn error from', remotePeerId, err);
  });
}

function initiateAudioCall(targetPeerId) {
  if (!AppState.processedStream) return;
  const call = AppState.peer.call(targetPeerId, AppState.processedStream);
  if (!call) return;

  tryPatchSDP(call);

  if (!AppState.peers[targetPeerId]) {
    AppState.peers[targetPeerId] = { dataConn: null, call: null, gainNode: null };
  }
  AppState.peers[targetPeerId].call = call;

  call.on('stream', (remoteStream) => {
    buildRemotePipeline(remoteStream, targetPeerId);
    addParticipantCard(targetPeerId, false);
  });

  call.on('close', () => {
    removePeer(targetPeerId);
  });

  call.on('error', (err) => {
    console.warn('Call error to', targetPeerId, err);
    removePeer(targetPeerId);
  });
}

function handleIncomingCall(call) {
  const remotePeerId = call.peer;

  if (!AppState.processedStream) {
    call.close();
    return;
  }

  call.answer(AppState.processedStream);
  tryPatchSDP(call);

  if (!AppState.peers[remotePeerId]) {
    AppState.peers[remotePeerId] = { dataConn: null, call: null, gainNode: null };
  }
  AppState.peers[remotePeerId].call = call;

  call.on('stream', (remoteStream) => {
    buildRemotePipeline(remoteStream, remotePeerId);
    if (!document.getElementById(`card-${remotePeerId}`)) {
      addParticipantCard(remotePeerId, false);
    }
  });

  call.on('close', () => {
    removePeer(remotePeerId);
  });

  call.on('error', (err) => {
    console.warn('Incoming call error from', remotePeerId, err);
    removePeer(remotePeerId);
  });
}

function tryPatchSDP(call) {
  // Try to access RTCPeerConnection via peerConnection property
  if (call.peerConnection) {
    const pc = call.peerConnection;
    const origCreateOffer = pc.createOffer.bind(pc);
    pc.createOffer = async (options) => {
      const offer = await origCreateOffer(options);
      offer.sdp = forceOpusCodec(offer.sdp);
      return offer;
    };
    const origCreateAnswer = pc.createAnswer.bind(pc);
    pc.createAnswer = async (options) => {
      const answer = await origCreateAnswer(options);
      answer.sdp = forceOpusCodec(answer.sdp);
      return answer;
    };
  }
}

async function hangUp() {
  AppState.isInCall = false;

  // Stop VAD
  if (AppState.vadAnimFrame) {
    cancelAnimationFrame(AppState.vadAnimFrame);
    AppState.vadAnimFrame = null;
  }

  // Release wake lock
  if (AppState.wakeLock) {
    try { await AppState.wakeLock.release(); } catch(e) {}
    AppState.wakeLock = null;
  }

  // Stop silent oscillator
  if (AppState.silentOscillator) {
    try { AppState.silentOscillator.stop(); } catch(e) {}
    AppState.silentOscillator = null;
  }

  // Stop heartbeat
  if (AppState.heartbeatInterval) {
    clearInterval(AppState.heartbeatInterval);
    AppState.heartbeatInterval = null;
  }

  // Close all peer connections
  Object.keys(AppState.peers).forEach(peerId => {
    const p = AppState.peers[peerId];
    if (p.call)     { try { p.call.close(); }     catch(e) {} }
    if (p.dataConn) { try { p.dataConn.close(); } catch(e) {} }
  });
  AppState.peers = {};
  AppState.peerGains = {};

  // Disconnect audio nodes
  if (AppState.masterGain) {
    try { AppState.masterGain.disconnect(); } catch(e) {}
    AppState.masterGain = null;
  }

  // Stop local stream
  if (AppState.localStream) {
    AppState.localStream.getTracks().forEach(t => t.stop());
    AppState.localStream = null;
  }
  AppState.processedStream = null;

  // Close AudioContext
  if (AppState.audioContext) {
    try { await AppState.audioContext.close(); } catch(e) {}
    AppState.audioContext = null;
  }

  // Destroy peer
  if (AppState.peer) {
    try { AppState.peer.destroy(); } catch(e) {}
    AppState.peer = null;
  }

  AppState.roomCode = null;
  AppState.isHost = false;
  AppState.isMuted = false;

  // Clear participants grid
  const grid = document.getElementById('participants-grid');
  if (grid) grid.innerHTML = '';

  showScreen('screen-menu');
}

function handlePeerError(err) {
  console.warn('Peer error:', err.type, err);
  if (err.type === 'peer-unavailable') {
    showToast('Sala no encontrada. Verifica el código.', 'error');
    // Clean up partially initialized state
    if (AppState.peer) { try { AppState.peer.destroy(); } catch(e) {} AppState.peer = null; }
    if (AppState.localStream) {
      AppState.localStream.getTracks().forEach(t => t.stop());
      AppState.localStream = null;
    }
    if (AppState.audioContext) {
      try { AppState.audioContext.close(); } catch(e) {}
      AppState.audioContext = null;
    }
    AppState.isInCall = false;
  } else if (err.type === 'network' || err.type === 'server-error') {
    showToast('Sin conexión. Verifica tu red.', 'error');
  } else if (err.type === 'unavailable-id') {
    showToast('Código de sala no disponible. Intenta de nuevo.', 'error');
  } else {
    showToast(`Error de conexión: ${err.type}`, 'error');
  }
}

function handleGetUserMediaError(e) {
  if (e.name === 'NotAllowedError' || e.name === 'PermissionDeniedError') {
    showToast('🎤 Permiso de micrófono denegado. Ve a Ajustes > Privacidad.', 'error');
  } else if (e.name === 'NotFoundError' || e.name === 'DevicesNotFoundError') {
    showToast('🎤 No se encontró micrófono en este dispositivo.', 'error');
  } else if (e.message === 'No_Mic') {
    showToast('🎤 No se pudo acceder al micrófono en ninguna configuración.', 'error');
  } else {
    showToast(`🎤 Error de micrófono: ${e.message || e.name}`, 'error');
  }
  // Cleanup
  if (AppState.audioContext) {
    try { AppState.audioContext.close(); } catch(ex) {}
    AppState.audioContext = null;
  }
  if (AppState.peer) {
    try { AppState.peer.destroy(); } catch(ex) {}
    AppState.peer = null;
  }
}

// ============================================================
// 7. GESTIÓN DE PARTICIPANTES
// ============================================================
function hashCode(str) {
  let hash = 0;
  for (let i = 0; i < str.length; i++) {
    hash = ((hash << 5) - hash) + str.charCodeAt(i);
    hash |= 0;
  }
  return Math.abs(hash);
}

function getAvatarColor(peerId) {
  const hue = hashCode(peerId) % 360;
  return `hsl(${hue}, 65%, 55%)`;
}

function setupRoomScreen() {
  const codeDisplay = document.getElementById('room-code-display');
  if (codeDisplay) codeDisplay.textContent = AppState.roomCode || '——';

  const grid = document.getElementById('participants-grid');
  if (grid) grid.innerHTML = '';

  // Add local participant card
  renderParticipantCard('local', true);

  // Show volume button for host
  const btnVolume = document.getElementById('btn-volume');
  if (btnVolume) btnVolume.style.display = AppState.isHost ? 'flex' : 'none';
}

function renderParticipantCard(peerId, isLocal) {
  const grid = document.getElementById('participants-grid');
  if (!grid) return;
  if (document.getElementById(`card-${peerId}`)) return; // Already exists

  const card = document.createElement('div');
  card.className = 'participant-card';
  card.id = `card-${peerId}`;

  const initials = isLocal
    ? 'TÚ'
    : (AppState.roomCode && peerId === AppState.roomCode ? 'HOST' : peerId.substring(0, 2).toUpperCase());

  const avatarColor = getAvatarColor(peerId);
  const displayName = isLocal ? 'TÚ' : peerId.substring(0, 6);

  card.innerHTML = `
    <div class="avatar-wrap">
      <div class="avatar-ring" id="ring-${peerId}"></div>
      <div class="avatar-circle" style="background:${avatarColor}">${initials}</div>
    </div>
    <div class="participant-name">${displayName}</div>
    <div class="participant-mic-icon" id="mic-icon-${peerId}">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="5" y="1" width="4" height="7" rx="2" fill="currentColor"/>
        <path d="M2.5 6.5c0 2.485 2.015 4.5 4.5 4.5s4.5-2.015 4.5-4.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" fill="none"/>
        <line x1="7" y1="11" x2="7" y2="13" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="5" y1="13" x2="9" y2="13" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
    </div>
  `;
  grid.appendChild(card);
}

function addParticipantCard(peerId, isLocal) {
  renderParticipantCard(peerId, isLocal);
}

function removePeer(peerId) {
  const p = AppState.peers[peerId];
  if (p) {
    if (p.call)     { try { p.call.close(); }     catch(e) {} }
    if (p.dataConn) { try { p.dataConn.close(); } catch(e) {} }
    if (p.gainNode) { try { p.gainNode.disconnect(); } catch(e) {} }
    delete AppState.peers[peerId];
    delete AppState.peerGains[peerId];
  }

  const card = document.getElementById(`card-${peerId}`);
  if (card) {
    card.classList.add('leaving');
    setTimeout(() => { if (card.parentNode) card.parentNode.removeChild(card); }, 280);
  }

  if (AppState.isInCall) {
    showToast('Un participante se desconectó.', 'info');
  }
}

function updateSpeakingIndicator(peerId, isSpeaking) {
  const ring = document.getElementById(`ring-${peerId}`);
  if (!ring) return;
  if (isSpeaking) {
    ring.classList.add('speaking');
  } else {
    ring.classList.remove('speaking');
  }
}

// ============================================================
// 8. VAD - DETECCIÓN DE ACTIVIDAD DE VOZ
// ============================================================
function startVAD(sourceNode) {
  const ctx = AppState.audioContext;
  if (!ctx) return;

  const analyser = ctx.createAnalyser();
  analyser.fftSize = 256;
  sourceNode.connect(analyser);
  const dataArray = new Uint8Array(analyser.frequencyBinCount);

  function checkVoiceActivity() {
    if (!AppState.isInCall) return;
    analyser.getByteFrequencyData(dataArray);
    const average = dataArray.reduce((a, b) => a + b, 0) / dataArray.length;
    const isSpeaking = average > 15 && !AppState.isMuted;
    updateSpeakingIndicator('local', isSpeaking);
    AppState.vadAnimFrame = requestAnimationFrame(checkVoiceActivity);
  }
  checkVoiceActivity();
}

// ============================================================
// 9. COMPATIBILIDAD iOS — SILENT OSCILLATOR, WAKE LOCK, VISIBILITY
// ============================================================
function startSilentOscillator() {
  const ctx = AppState.audioContext;
  if (!ctx) return;
  try {
    const osc = ctx.createOscillator();
    const gainNode = ctx.createGain();
    gainNode.gain.setValueAtTime(0.00001, ctx.currentTime);
    osc.connect(gainNode);
    gainNode.connect(ctx.destination);
    osc.start();
    AppState.silentOscillator = osc;
  } catch(e) {
    console.warn('Silent oscillator failed:', e);
  }
}

async function acquireWakeLock() {
  if (!('wakeLock' in navigator)) return;
  try {
    AppState.wakeLock = await navigator.wakeLock.request('screen');
    AppState.wakeLock.addEventListener('release', () => {
      AppState.wakeLock = null;
    });
  } catch(e) {
    console.warn('WakeLock not available:', e);
  }
}

// Heartbeat interval reference
let heartbeatCounter = 0;

function startHeartbeat() {
  if (AppState.heartbeatInterval) return;
  AppState.heartbeatInterval = setInterval(() => {
    if (!AppState.isInCall) return;
    heartbeatCounter++;
    Object.keys(AppState.peers).forEach(peerId => {
      const p = AppState.peers[peerId];
      if (p.dataConn && p.dataConn.open) {
        try { p.dataConn.send({ type: 'ping' }); } catch(e) {}
      }
    });
  }, 15000);
}

document.addEventListener('visibilitychange', async () => {
  if (!AppState.isInCall) return;

  if (document.visibilityState === 'hidden') {
    // Increase heartbeat frequency when in background
    if (AppState.heartbeatInterval) {
      clearInterval(AppState.heartbeatInterval);
      AppState.heartbeatInterval = null;
    }
    AppState.heartbeatInterval = setInterval(() => {
      if (!AppState.isInCall) return;
      Object.keys(AppState.peers).forEach(peerId => {
        const p = AppState.peers[peerId];
        if (p.dataConn && p.dataConn.open) {
          try { p.dataConn.send({ type: 'ping' }); } catch(e) {}
        }
      });
    }, 5000);

    // Resume audio context (iOS might suspend it)
    await resumeAudioContext();

  } else {
    // Back to foreground: restore normal heartbeat
    if (AppState.heartbeatInterval) {
      clearInterval(AppState.heartbeatInterval);
      AppState.heartbeatInterval = null;
    }
    startHeartbeat();

    // Re-acquire wake lock
    if (!AppState.wakeLock) {
      await acquireWakeLock();
    }

    // Resume audio context
    await resumeAudioContext();

    // Check peer connection states and attempt reconnect
    Object.keys(AppState.peers).forEach(peerId => {
      const p = AppState.peers[peerId];
      if (p.call && p.call.peerConnection) {
        const pc = p.call.peerConnection;
        if (pc.connectionState === 'disconnected' || pc.connectionState === 'failed') {
          console.warn(`Peer ${peerId} disconnected, attempting reconnect...`);
          // Re-initiate audio call
          initiateAudioCall(peerId);
        }
      }
    });
  }
});

// ============================================================
// 10. EVENT LISTENERS DE UI
// ============================================================

// Splash → Menu
document.getElementById('btn-start').addEventListener('click', () => {
  showScreen('screen-menu');
});

// Menu → Create Room
document.getElementById('btn-create-room').addEventListener('click', async () => {
  await createRoom();
});

// Menu → Join Screen
document.getElementById('btn-go-join').addEventListener('click', () => {
  showScreen('screen-join');
});

// Menu → Back
document.getElementById('btn-menu-back').addEventListener('click', () => {
  showScreen('screen-splash');
});

// Join input — force uppercase
document.getElementById('input-room-code').addEventListener('input', (e) => {
  const input = e.target;
  const val = input.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
  input.value = val;
});

// Join → Join Room
document.getElementById('btn-join-room').addEventListener('click', async () => {
  const code = document.getElementById('input-room-code').value.trim().toUpperCase();
  document.getElementById('input-room-code').value = '';
  await joinRoom(code);
});

// Join Enter key
document.getElementById('input-room-code').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    document.getElementById('btn-join-room').click();
  }
});

// Join → Back
document.getElementById('btn-join-back').addEventListener('click', () => {
  showScreen('screen-menu');
});

// Room → Copy Code
document.getElementById('btn-copy-code').addEventListener('click', async () => {
  if (AppState.roomCode) {
    try {
      await navigator.clipboard.writeText(AppState.roomCode);
      showToast('✓ Código copiado', 'success');
    } catch(e) {
      // Fallback for older iOS
      const textArea = document.createElement('textarea');
      textArea.value = AppState.roomCode;
      textArea.style.position = 'fixed';
      textArea.style.opacity = '0';
      document.body.appendChild(textArea);
      textArea.focus();
      textArea.select();
      try {
        document.execCommand('copy');
        showToast('✓ Código copiado', 'success');
      } catch(err) {
        showToast('No se pudo copiar el código', 'error');
      }
      document.body.removeChild(textArea);
    }
  }
});

// Room → Mute
document.getElementById('btn-mute').addEventListener('click', () => {
  if (!AppState.isInCall || !AppState.localStream) return;
  AppState.isMuted = !AppState.isMuted;

  AppState.localStream.getAudioTracks().forEach(track => {
    track.enabled = !AppState.isMuted;
  });

  const btnMute = document.getElementById('btn-mute');
  const iconOn  = document.getElementById('icon-mic-on');
  const iconOff = document.getElementById('icon-mic-off');

  if (AppState.isMuted) {
    btnMute.classList.add('muted');
    iconOn.style.display  = 'none';
    iconOff.style.display = 'block';
    updateSpeakingIndicator('local', false);
  } else {
    btnMute.classList.remove('muted');
    iconOn.style.display  = 'block';
    iconOff.style.display = 'none';
  }
});

// Room → Hangup
document.getElementById('btn-hangup').addEventListener('click', () => {
  showModal({
    title: '¿Colgar la llamada?',
    message: 'Saldrás de la sala y se cerrarán todas las conexiones de audio.',
    confirmText: 'Colgar',
    cancelText: 'Cancelar',
    danger: true,
    onConfirm: () => hangUp()
  });
});

// Room → Volume (host only)
document.getElementById('btn-volume').addEventListener('click', () => {
  document.getElementById('volume-sheet').classList.add('open');
  document.getElementById('sheet-backdrop').classList.add('active');
});

document.getElementById('sheet-backdrop').addEventListener('click', () => {
  document.getElementById('volume-sheet').classList.remove('open');
  document.getElementById('sheet-backdrop').classList.remove('active');
});

document.getElementById('volume-slider').addEventListener('input', (e) => {
  const val = parseInt(e.target.value, 10);
  document.getElementById('volume-label').textContent = `${val}%`;
  if (AppState.masterGain && AppState.audioContext) {
    AppState.masterGain.gain.setValueAtTime(val / 100, AppState.audioContext.currentTime);
  }
}, { passive: true });

// ============================================================
// 11. INICIALIZACIÓN DE LA APP
// ============================================================
document.addEventListener('DOMContentLoaded', () => {
  // Ensure splash screen is active
  const splash = document.getElementById('screen-splash');
  if (splash) {
    splash.classList.add('active');
    currentScreen = 'screen-splash';
  }

  // iOS-specific: prevent double-tap zoom
  if (isIOS) {
    document.addEventListener('touchend', (e) => {
      const target = e.target;
      if (target.tagName === 'BUTTON' || target.closest('button')) {
        e.preventDefault();
      }
    }, { passive: false });
  }

  // Start heartbeat once in call (monitored via AppState)
  // Heartbeat is started from createRoom/joinRoom after peer is opened
});

// Ensure PeerJS is loaded before use (it's deferred)
window.addEventListener('load', () => {
  if (typeof Peer === 'undefined') {
    showToast('Error al cargar PeerJS. Verifica tu conexión.', 'error');
  }
});
